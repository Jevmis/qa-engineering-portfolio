site_name: Michael J. Ndueso
site_description: Senior Quality Assurance Engineer | SDET | Test Automation | API Testing | Performance Testing | Security Testing | CI/CD
site_author: Michael J. Ndueso
site_url: https://michaeljndueso.is-a.dev

repo_url: https://github.com/Jevmis/docs
repo_name: Jevmis/docs
edit_uri: edit/main/docs/

copyright: Copyright © 2026 Michael J. Ndueso

theme:
  name: material

  # logo: assets/branding/logo.svg
  favicon: assets/branding/favicon.png

  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github

  palette:

    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to Dark Mode

    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to Light Mode

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search
  - glightbox
  - awesome-pages
  - minify
  - git-revision-date-localized

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes

  - pymdownx.details
  - pymdownx.superfences

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite
  - pymdownx.snippets

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.keys
  - pymdownx.magiclink

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false

  status:
    new: Recently Added

  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/michaeljndueso
      name: LinkedIn

    - icon: fontawesome/brands/upwork
      link: https://www.upwork.com/freelancers/~018ed634d00e6dd13c?mp_source=share
      name: Upwork

    - icon: fontawesome/brands/github
      link: https://github.com/Jevmis
      name: GitHub

    # - icon: fontawesome/brands/x-twitter
    #   link: https://x.com/jevmis
    #   name: X

    - icon: fontawesome/solid/envelope
      link: mailto:Michaeljndueso@outlook.com
      name: Email

    - icon: fontawesome/solid/phone
      link: tel:+2348098963410
      name: Call

  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: Helpful

        - icon: material/thumb-down-outline
          name: Needs Improvement

extra_css:
  - styles/extra.css

extra_javascript:
  - javascripts/extra.js

